# mgmt configuration — copy to $XDG_CONFIG_HOME/mgmt/config.yaml and edit.
# Every section is optional; an absent file behaves exactly like the built-in defaults.

# Override the data root (where tasks/ and calendars/ live). Defaults to $XDG_DATA_HOME/mgmt.
# data_dir: ~/.local/share/mgmt

# Task statuses = kanban columns, in board order. `id` is stored verbatim in task frontmatter;
# `kind` (open|active|done|cancelled) drives "is it open/done?" and the CalDAV VTODO mapping.
# `color` is optional (a name like `cyan`, a `#rrggbb` hex, or an ANSI index) — omit for an
# auto-assigned stable color. Omit the whole section for the built-in default
# (todo → doing → done → cancelled). The `blocked` row below is just an example extra column.
statuses:
  - { id: todo,      label: Todo }
  - { id: doing,     label: Doing,     color: cyan, kind: active }
  - { id: blocked,   label: Blocked,   color: red }
  - { id: done,      label: Done,      kind: done }
  - { id: cancelled, label: Cancelled, kind: cancelled }

# Per-project color OVERRIDES. Projects themselves live as one markdown file each under
# <data_root>/projects/ (portable, hand-editable; `color:` in their frontmatter is preferred).
# This section only overrides those, and colors projects that have no .md yet. Unlisted/uncolored
# projects get a stable auto color.
projects:
  wng:  { color: blue }
  home: { color: "#a6e3a1" }

# Reminders & alarms.
#   defaults        — offsets applied to a *task* that gains a due date but specifies none.
#   event_defaults  — alarms applied to a new *event* that specifies none. Each entry is
#                     { minutes: <before start>, action: notify|navigate|run, ... }.
#                       notify   — desktop notification (the default if `action` is omitted).
#                       navigate — notify AND bring mgmt to the event (focus a running window via
#                                  the daemon, or open a fresh terminal navigated to it).
#                       run      — execute a binary (a custom hook). `command` + `args`; the
#                                  args accept placeholders {uid} {summary} {start} {end}
#                                  {location} {calendar} {minutes}.
#                     Omit the section entirely for the built-in default: one notify 15m before.
reminders:
  defaults: [1d, 2h]
  event_defaults:
    - { minutes: 15 }                      # notify 15 minutes before (the built-in default)
    # - { minutes: 10, action: navigate }  # also pop mgmt open on the event
    # - { minutes: 5, action: run, command: notify-send, args: ["mgmt", "{summary} in {minutes}m"] }

# Background reminder daemon (`mgmt daemon`, run as a service). Fires the alarms above even when
# the TUI is closed.
daemon:
  poll_seconds: 30
  # How to open mgmt in a terminal for `navigate` reminders. The mgmt invocation is appended,
  # e.g. ["kitty", "-e"] -> `kitty -e mgmt tui --event <uid>`. Empty = auto-detect an emulator.
  terminal: []          # e.g. [kitty, -e] / [gnome-terminal, --] / [alacritty, -e] / [foot]
  # How to RAISE an already-running mgmt window before spawning a fresh one.
  focus:
    # auto (detect from session) | gnome (window-calls D-Bus) | wlroots (wdotool) |
    # command (run `command`) | spawn (never raise; always open fresh).
    strategy: auto
    window_title: mgmt  # the title mgmt sets; the raise strategy matches windows against it
    # command: [wdotool, search, --name, "{title}"]   # only for strategy: command
  # Status-bar widgets: a compact line (pomodoro session + next event) the daemon pushes to a
  # desktop bar. On GNOME it drives the bundled `mgmt status` shell extension over D-Bus; the
  # extension animates the countdown itself and a click menu runs `mgmt focus …`.
  status_bar:
    enabled: true
    # auto (GNOME if a GNOME session, else off) | gnome | command | file | none
    backend: auto
    # Refresh cadence. GNOME animates the countdown itself, so this only bounds how fast a phase
    # change / next-event change shows there; for command/file it is the text-refresh rate.
    interval_seconds: 1
    show_pomodoro: true
    show_next_event: true
    next_event_horizon_hours: 168          # how far ahead to look for the next event (1 week)
    # backend: command — run a setter with the rendered line as the final arg (waybar/polybar/…):
    # command: [my-bar-set]
    # backend: file — write the rendered line here for a bar to tail:
    # file: ~/.local/state/mgmt/status.txt

# Base palette overrides (any subset). Slots: accent, selected_bg, selected_fg, dim, today,
# event, task, done, border.
theme:
  accent: cyan
  today: yellow

# Calendar display options.
calendar:
  # Show end time in the day agenda panel (HH:MM–HH:MM instead of just HH:MM). Default: true.
  show_end_time: true
  # How many event-label rows to show below each date row in the month grid (0–3).
  #   0  — compact: just a dot indicator when a day has events (default)
  #   1  — one event label row per day; month panel widens to half the screen
  #   2  — two event rows (roughly Google Calendar density)
  month_event_lines: 0

# Tasks-view smart lists, in order. Valid ids: inbox, today, next7, all. Omit for all of them.
views:
  - { id: inbox }
  - { id: today }
  - { id: next7 }
  - { id: all }

# CalDAV sync (consumed by `mgmt sync`). Mirrors the old config.toml, now in YAML.
accounts:
  - { name: home, auth: basic, username: you, password: secret }
collections:
  - { name: work, kind: events, url: "http://localhost:4000/dav/cal/work/", account: home }
  - { name: todos, kind: tasks, url: "http://localhost:4000/dav/cal/todos/", account: home }
